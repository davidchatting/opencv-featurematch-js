name: Build minified bundle

on:
  push:
    branches: [main]
    paths:
      - 'opencv-featurematch-js.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Minify opencv-featurematch-js.js
        run: npx --yes terser opencv-featurematch-js.js --compress --mangle --comments "/^!/" -o opencv-featurematch-js.min.js

      - name: Commit if changed
        run: |
          if git diff --quiet -- opencv-featurematch-js.min.js; then
            echo "No changes to minified bundle"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add opencv-featurematch-js.min.js
          git commit -m "Rebuild opencv-featurematch-js.min.js"
          git push
