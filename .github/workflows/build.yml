name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Minify opencv-featurematch-js.js
        run: npx --yes terser opencv-featurematch-js.js --compress --mangle --comments "/^!/" -o opencv-featurematch-js.min.js

      - name: Sync p5js/ from the demo sketch (package.json's homepage)
        run: |
          SKETCH_ID=$(node -p "require('./package.json').homepage.split('/').pop()")
          curl -sL "https://editor.p5js.org/editor/projects/${SKETCH_ID}/zip" -o p5js-demo.zip

          rm -rf p5js p5js-tmp
          mkdir -p p5js-tmp
          python3 -c "import zipfile; zipfile.ZipFile('p5js-demo.zip').extractall('p5js-tmp')"

          # Only the actual project files - not the CDN libraries (p5.js,
          # opencv.js, shimage.js, opencv-featurematch-js.js) the editor
          # bundles into the zip for its own standalone-download use case.
          mkdir -p p5js
          cp p5js-tmp/index.html p5js/index.html
          cp p5js-tmp/sketch.js p5js/sketch.js
          cp p5js-tmp/style.css p5js/style.css
          if [ -d p5js-tmp/images ]; then
            cp -r p5js-tmp/images p5js/images
          fi

          rm -rf p5js-tmp p5js-demo.zip

      - name: Sync README code blocks and link from p5js/ and package.json
        run: |
          python3 <<'PYEOF'
          import json
          import re

          def sync(readme, marker, body):
              # Matches (and replaces) the whole span from the opening marker
              # to the closing one, whatever it currently holds - not just a
              # pre-existing fence - so a manual edit that strips the fence
              # (or empties the block entirely) can't wedge this open.
              pattern = re.compile(
                  r'<!-- p5js-sync:' + re.escape(marker) + r' -->.*?<!-- /p5js-sync:' + re.escape(marker) + r' -->',
                  re.DOTALL
              )
              replacement = f'<!-- p5js-sync:{marker} -->\n{body}\n<!-- /p5js-sync:{marker} -->'
              # Replacement passed as a function, not a string, so content
              # containing regex backreference-like sequences (e.g. "\1")
              # is inserted literally rather than being reinterpreted.
              return pattern.sub(lambda m: replacement, readme)

          def sync_url(readme, marker, url, default_text='**Open in the p5.js editor**'):
              # Like sync(), but only ever replaces the URL inside the
              # markdown link's (...) - whatever link text already sits in
              # [...] between the markers (custom or otherwise) is left
              # alone. Only falls back to reconstructing a full default link
              # when there's no existing link to preserve the text of, e.g.
              # the very first run against an empty block.
              block_pattern = re.compile(
                  r'<!-- p5js-sync:' + re.escape(marker) + r' -->.*?<!-- /p5js-sync:' + re.escape(marker) + r' -->',
                  re.DOTALL
              )
              block_match = block_pattern.search(readme)
              if not block_match:
                  return readme

              block = block_match.group(0)
              link_pattern = re.compile(r'\]\(https?://[^)\s]*\)')
              if link_pattern.search(block):
                  new_block = link_pattern.sub(lambda m: f']({url})', block, count=1)
              else:
                  new_block = f'<!-- p5js-sync:{marker} -->\n[{default_text}]({url})\n<!-- /p5js-sync:{marker} -->'

              return readme[:block_match.start()] + new_block + readme[block_match.end():]

          def file_content(path):
              with open(path) as f:
                  return f.read().rstrip('\n')

          with open('README.md') as f:
              readme = f.read()

          readme = sync(readme, 'index.html', '```html\n' + file_content('p5js/index.html') + '\n```')
          readme = sync(readme, 'sketch.js', '```js\n' + file_content('p5js/sketch.js') + '\n```')

          with open('package.json') as f:
              homepage = json.load(f)['homepage']
          readme = sync_url(readme, 'homepage', homepage)

          with open('README.md', 'w') as f:
              f.write(readme)
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add opencv-featurematch-js.min.js p5js README.md
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Rebuild opencv-featurematch-js.min.js and sync p5js/ demo"
          git push
